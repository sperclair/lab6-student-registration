<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lab6-student-registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
     <nav class="bg-white sticky top-0 p-5 flex justify-between ">
        <div class="text-blue-600 font-bold text-center text-2xl">Suchunya</div>
        <button class="bg-blue-600 hover:bg-blue-700 text-white rounded-full py-2 px-8 ">Register</button>
    </nav>

    <div class="flex justify-center items-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-auto max-w-2xl">
            <h2 class="text-2xl font-bold text-gray-800 text-center">Student Registration</h2>
            
            <form id="registrationForm" class="mt-8 space-y-4">
                
                <div>
                    <p class="block mb-3 text-xl">Name - Lastname</p>
                    <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <p class="block mb-3 text-xl">Student ID</p>
                        <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <p class="block mb-3 text-xl">Major/Department</p>
                        <input type="text" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block mb-3 text-xl">Gmail</label>
                    <input type="email" required class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="flex justify-center mt-6"> 
                    <button type="submit" class="bg-blue-600 text-white rounded-full py-3 px-12 font-semibold hover:bg-blue-700 transition">
                        Submit
                    </button>
                </div>
                
            </form>

            <div id="successMessage" class="hidden text-center py-10">
                <h2 class="text-xl font-bold text-blue-600">Success Register!</h2>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', function(event){
            event.preventDefault();
            form.classList.add('hidden');
            successMessage.classList.remove('hidden')
        });
    </script>


</body>
</html>
